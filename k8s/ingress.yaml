apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: airport-manager-ingress
  namespace: airport-manager
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    # Strip /api prefix before forwarding to backend (backend already has context-path /api)
    # nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  # Uncomment once TLS is set up (cert-manager or Cloudflare origin cert):
  # tls:
  #   - hosts:
  #       - airport-manager.com
  #       - www.airport-manager.com
  #       - api.airport-manager.com
  #     secretName: airport-manager-tls
  rules:
    - host: api.airport-manager.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
    - host: airport-manager.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
    - host: www.airport-manager.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
